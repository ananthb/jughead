{{ if gt .TotalPages 1 }}
  <nav>
    <ul>
      <li>
        {{ with .Prev }}
          <a href="{{ .URL }}" aria-label="Previous">
            <span aria-hidden="true">&larr; Prev</span>
          </a>
        {{ end }}
      </li>
      <li>
        {{ with .Next }}
          <a href="{{ .URL }}" aria-label="Next">
            <span aria-hidden="true">Next &rarr;</span>
          </a>
        {{ end }}
      </li>
    </ul>
  </nav>
{{ end }}
